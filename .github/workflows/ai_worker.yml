name: Monolith_AI_Agent
on:
  repository_dispatch:
    types: [ai_query]
  workflow_dispatch: 

jobs:
  test_bridge:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Даем права на запись
    steps:
      - uses: actions/checkout@v3
      - name: Create Test Answer
        run: echo "Агент на связи. Система детерминирована." > answer.txt
      - name: Push to Repo
        run: |
          git config --global user.email "sputnik@monolith.zero"
          git config --global user.name "Sputnik Agent"
          git add answer.txt
          git commit -m "Update answer"
          git push
