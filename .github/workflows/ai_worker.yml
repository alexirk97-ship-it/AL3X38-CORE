name: Monolith_AI_Agent
on:
  repository_dispatch: # Запуск по сигналу извне
    types: [ai_query]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Internet Access & AI Synthesis
        env:
          GROQ_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          # Скрипт идет в интернет, берет данные и пишет в файл answer.txt
          python -c "import requests; print(requests.post('https://groq.com', headers={'Authorization': 'Bearer $GROQ_KEY'}, json={'model': 'llama3-8b-8192', 'messages': [{'role': 'user', 'content': '${{ github.event.client_payload.query }}'}]}).json()['choices'][0]['message']['content'])" > answer.txt
      - name: Sync Answer back to Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "sputnik@monolith.zero"
          git config --global user.name "Sputnik Agent"
          git add answer.txt
          git commit -m "Update result"
          git push https://USERNAME:$HF_TOKEN@huggingface.co/spaces/USERNAME/SPACE_NAME main
